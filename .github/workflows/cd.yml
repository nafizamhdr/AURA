name: CD (Continuous Deployment)

# Release-time pipeline: validate the serving layer and build the container
# image. Runs on demand or when a version tag is pushed -- not on every commit.
on:
  workflow_dispatch:
  push:
    tags: ["v*"]

jobs:
  test-and-build:
    runs-on: ubuntu-latest
    env:
      PYTHONUTF8: "1"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-dev.txt

      - name: API, registry & monitoring tests
        run: pytest tests/test_api.py tests/test_registry.py tests/test_monitor.py

      - name: Docker build (smoke test of the serving image)
        run: docker build -t aura-api:ci .

      # Real deployment (e.g. push image to a registry, or sync to Hugging Face
      # Spaces) goes here and requires repository secrets such as HF_TOKEN.
      # - name: Deploy to Hugging Face Spaces
      #   run: ...
