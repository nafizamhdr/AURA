name: CT (Continuous Training)

# Continuous Training pipeline: retrain on a schedule (or on demand), evaluate
# performance + fairness, and report the quality-gate decision. It does NOT
# promote artifacts (no --promote), so it never overwrites the shipped model.
on:
  workflow_dispatch:
  schedule:
    - cron: "0 2 * * 1"   # every Monday 02:00 UTC

jobs:
  retrain-and-evaluate:
    runs-on: ubuntu-latest
    env:
      PYTHONUTF8: "1"
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        # No LFS needed: CT trains a fresh model from the CSV dataset.

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-dev.txt

      - name: Fairness & robustness checks
        run: pytest tests/test_fairness.py tests/test_robustness.py

      # Features are recomputed from the raw CSV via ct/features.py (replicates
      # FE.ipynb), so the retrain uses the real temporal features and reaches
      # ~MAE 10 days / R2 0.98. Gate uses the production-aligned defaults.
      - name: Continuous training + quality gate (dry-run, no promote)
        run: python -m ct.train
